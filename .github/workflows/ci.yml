name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build wheel and sdist
        run: |
          pip install build
          python -m build

      - name: Verify wheel installs
        run: |
          pip install dist/*.whl
          agent-knowledge --version
          agent-knowledge --help

      - name: Verify CLI subcommands
        run: |
          agent-knowledge init --help
          agent-knowledge doctor --help
          agent-knowledge update --help
